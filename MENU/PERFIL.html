<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Bitácora</title>
    <link rel="stylesheet" href="PERFIL.css">
    <link rel="stylesheet" href="MENU.css">
</head>
<body>
    <script src="MENU.js"></script>
    <script src="../Script.js"></script>
    
    <main class="ContenedorRegistro">

        <div id="modalRegistro" class="modal-overlay">
            <div class="modal-content">
                <h2>REGISTRO DE BITÁCORA</h2>
                <input type="text" id="reg-nombre" placeholder="NOMBRE COMPLETO">
                <input type="email" id="reg-correo" placeholder="CORREO ELECTRÓNICO">
                <input type="password" id="reg-pass" placeholder="CONTRASEÑA">
                <button onclick="guardarRegistroInicial()">ACEPTAR Y ENTRAR</button>
            </div>
        </div>

<div class="ContenedorLibreta">
    <img src="../ELEMENTOS/8.png" alt="Libreta" class="libreta-fondo">
    
    <div id="CredencialDODO" class="CredencialIdentidad">
        <div class="FotoCredencial" id="DisplayAvatar"></div>
        <div class="InfoCredencial">
            <h4 id="DisplayNombre">NOMBRE APELLIDO</h4>
            <p id="DisplayArea">DISEÑO INTEGRAL</p>
            <small>ID: DO-DO-2026</small>
        </div>
    </div>

    <form class="FormularioLibreta" id="FormularioPerfil" onsubmit="actualizarBitacora(event)">
        </form>
</div>
    </main>

</body>
</html>
