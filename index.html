<head>
    <link rel="stylesheet" href="../FUENTES/chillax.css">
    <link rel="stylesheet" href="Index.css">
</head>
<body>
    <div id="PantallaCarga">
        <div class="LogoAnimado">
            <span class="Letra">D</span>
            <span class="Letra">O</span>
            <span class="Guion">-</span>
            <span class="Letra">D</span>
            <span class="Letra">O</span>
        </div>
        <p style="position: absolute; bottom: 20%; letter-spacing: 5px; font-size: 0.8rem; opacity: 0.6; color: white;">PRESIONA ESPACIO PARA ENTRAR</p>
    </div>

    <audio id="AudioIntro" src="AUDIOS/1.mp3" preload="auto"></audio>

<script>
    const audio = document.getElementById('AudioIntro');
    const pantalla = document.getElementById('PantallaCarga');
    let iniciado = false;

    const comenzarExperiencia = () => {
        if (iniciado) return;
        iniciado = true;

        audio.play().catch(error => {
            console.log("El navegador bloqueó el autoplay sin interacción previa:", error);
        });

        pantalla.style.transition = "opacity 4s ease, visibility 4s";
        pantalla.style.opacity = "0";
        pantalla.style.visibility = "hidden";

        audio.onended = () => {
            window.location.replace("MENU/INICIO.html");
        };

        setTimeout(() => {
            window.location.replace("MENU/INICIO.html");
        }, 5000);
    };

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            comenzarExperiencia();
        }
    });
    pantalla.addEventListener('click', () => {
        comenzarExperiencia();
    });
</script>

</body>
