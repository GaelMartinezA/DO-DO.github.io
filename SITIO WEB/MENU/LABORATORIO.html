<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DO-DO | LAB</title>
    <link rel="stylesheet" href="LABORATORIO.css">
    <link rel="stylesheet" href="MENU.css">
    <link rel="stylesheet" href="../FUENTES/chillax.css">
</head>
<body>

<main class="ContenedorTablero">

    <h1 class="TituloPagina">Laboratorio</h1>
    <p class="SubtituloPagina">Explora actividades que te ayudaran a salir del bloque creativo, ademas que pondras tus conocimientos a prueba.</p>

    <section class="SelectorJuegos">
        <div class="CarruselInterno">
            
            <article class="Maquina" onclick="seleccionarJuego(this, 'retro1')">
                    <img src="../ELEMENTOS/28.png" class="ImagenMaquina">
                <div class="FichaTecnica">
                    <h2 class="TituloJuego">DISEÑO EXPRESS</h2>
                </div>
            </article>

            <article class="Maquina" onclick="seleccionarJuego(this, 'retro2')">
                    <img src="../ELEMENTOS/29.png" class="ImagenMaquina">
                <div class="FichaTecnica">
                    <h2 class="TituloJuego">LA GARRA DE ESTILOS</h2>
                </div>
            </article>

            <article class="Maquina" onclick="seleccionarJuego(this, 'retro3')">
                    <img src="../ELEMENTOS/30.png" class="ImagenMaquina">
                <div class="FichaTecnica">
                    <h2 class="TituloJuego">MIXER</h2>
                </div>
            </article>

            <article class="Maquina JuegoBloqueado">
                <img src="../ELEMENTOS/31.png" class="ImagenMaquina">
                <div class="FichaTecnica">
                <h2 class="TituloJuego">PRÓXIMAMENTE</h2>
                </div>
                <div class="EtiquetaBloqueo">BLOQUEADO</div>
            </article>

        </div>
    </section>

    <article>
        <p id="Descripcion">SELECCIONA UN JUEGO</p>
    </article>

    <div id="Accion" class="ZonaAccion" style="display:none;">
        <button class="BotonEjecutar" onclick="lanzarJuego()">JUGAR</button>
    </div>
</main>

    <script src="../Script.js"></script>
    <script src="MENU.js"></script>
</body>
</html>
